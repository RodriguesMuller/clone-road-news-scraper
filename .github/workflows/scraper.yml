name: Road News Scraper

on:
  schedule:
    # Executa a cada 2 horas (horário UTC — ajuste conforme necessário)
    # Para rodar às horas pares no horário de Brasília (UTC-3):
    # BRT  06:00 → UTC 09:00 → cron: 0 9 * * *
    # Ou simplesmente a cada 2h:
    - cron: "0 */2 * * *"

  # Permite disparar manualmente pelo painel do GitHub
  workflow_dispatch:

# Permissões do token usado nas execuções (GITHUB_TOKEN). "actions: write"
# permite disparar outros workflows via API quando necessário.
permissions:
  contents: read
  actions: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Executar scraper
        env:
          # Secret configurado em: Settings → Secrets → Actions
          # O secret se chama SUPABASE e contém a connection string do
          # "Session pooler" do Supabase (IPv4); aqui mapeamos para a variável
          # DATABASE_URL que o main.py lê.
          DATABASE_URL: ${{ secrets.SUPABASE }}
        run: python main.py
