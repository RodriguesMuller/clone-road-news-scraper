name: Road News Scraper

on:
  push:
    branches:
      - main
  schedule:
    # Runs every hour in UTC.
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate Supabase secret
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL || secrets.SUPABASE }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "Configure a repository secret named DATABASE_URL or SUPABASE with the Supabase Postgres connection string."
            exit 1
          fi
          if ! echo "$DATABASE_URL" | grep -q '^postgresql://'; then
            echo "The database secret must start with postgresql://"
            exit 1
          fi

      - name: Run scraper
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL || secrets.SUPABASE }}
        run: python main.py
