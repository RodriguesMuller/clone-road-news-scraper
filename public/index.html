<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Road News</title>
  <style>
    :root {
      --ink: #101614;
      --muted: #65706c;
      --line: #dfe6e2;
      --paper: #fff;
      --soft: #f4f7f5;
      --accent: #12d981;
      --accent-dark: #087548;
      --violet: #6247ff;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }
    body { margin: 0; background: var(--soft); color: var(--ink); }
    header { background: var(--ink); color: white; border-bottom: 4px solid var(--accent); }
    .bar, main, footer { max-width: 1120px; margin: 0 auto; }
    .bar { padding: 22px 18px; display: flex; justify-content: space-between; align-items: center; gap: 16px; flex-wrap: wrap; }
    .brand { font-size: 22px; font-weight: 800; line-height: 1.1; }
    .brand span { display: block; margin-top: 6px; color: #b6c3bd; font-size: 12px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; }
    button { border: 0; border-radius: 6px; background: var(--accent); color: #07100c; cursor: pointer; font-weight: 800; padding: 11px 16px; }
    button:disabled { cursor: wait; opacity: .65; }
    main { padding: 24px 18px 48px; }
    footer { padding: 0 18px 28px; color: var(--muted); font-size: 12px; }
    .notice { display: none; margin-bottom: 18px; border: 1px solid #edd780; background: #fff8d7; border-radius: 8px; padding: 12px 14px; color: #4a3b00; font-size: 14px; }
    .stats { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; margin-bottom: 18px; }
    .stat, .panel, .item { background: var(--paper); border: 1px solid var(--line); border-radius: 8px; }
    .stat { padding: 16px; min-height: 104px; }
    .label, h2 { color: var(--muted); font-size: 11px; font-weight: 800; letter-spacing: .1em; text-transform: uppercase; }
    h2 { margin: 0 0 14px; color: var(--ink); }
    .value { margin-top: 10px; font-size: 32px; font-weight: 800; line-height: 1; }
    .hint { margin-top: 8px; color: var(--muted); font-size: 13px; }
    .layout { display: grid; grid-template-columns: minmax(0, 1fr) 300px; gap: 16px; align-items: start; }
    .panel { padding: 16px; }
    .list, .sources { display: grid; gap: 10px; }
    .item { padding: 14px 15px; }
    .meta { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; margin-bottom: 8px; color: var(--muted); font-size: 12px; font-weight: 700; }
    .tag { border-radius: 999px; background: #daf8ea; color: var(--accent-dark); padding: 4px 8px; font-size: 11px; text-transform: uppercase; letter-spacing: .08em; }
    .tag.weather { background: #ebe7ff; color: var(--violet); }
    .tag.road { background: #d6fff0; color: #055c39; }
    .title { margin: 0; font-size: 16px; font-weight: 750; line-height: 1.35; }
    .title a { color: inherit; text-decoration: none; }
    .title a:hover { text-decoration: underline; }
    .actions { margin-top: 12px; display: flex; gap: 8px; flex-wrap: wrap; }
    .mini-button { border: 1px solid var(--line); background: #f7fbf9; color: var(--ink); border-radius: 6px; padding: 8px 10px; font-size: 12px; font-weight: 800; }
    .mini-button:hover { border-color: var(--accent); }
    .source { display: flex; justify-content: space-between; gap: 10px; border-bottom: 1px solid var(--line); padding-bottom: 8px; color: var(--muted); font-size: 13px; }
    .source:last-child { border-bottom: 0; padding-bottom: 0; }
    .source b { color: var(--ink); }
    .modal { position: fixed; inset: 0; display: none; align-items: center; justify-content: center; background: rgba(8, 15, 12, .78); padding: 18px; z-index: 10; }
    .modal.open { display: flex; }
    .modal-card { width: min(100%, 980px); max-height: 94vh; overflow: auto; background: var(--paper); border-radius: 8px; border: 1px solid var(--line); box-shadow: 0 18px 70px rgba(0,0,0,.35); }
    .modal-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; border-bottom: 1px solid var(--line); padding: 14px 16px; }
    .modal-head strong { font-size: 15px; }
    .modal-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .canvas-wrap { background: #111b16; padding: 16px; display: grid; place-items: center; }
    #shareCanvas { width: min(100%, 720px); height: auto; border-radius: 6px; box-shadow: 0 10px 34px rgba(0,0,0,.28); }
    @media (max-width: 820px) { .stats { grid-template-columns: repeat(2, minmax(0, 1fr)); } .layout { grid-template-columns: 1fr; } }
    @media (max-width: 480px) { .stats { grid-template-columns: 1fr; } .value { font-size: 28px; } }
  </style>
</head>
<body>
  <header>
    <div class="bar">
      <div class="brand">Road News<span>GitHub Actions + Supabase + Vercel frontend</span></div>
      <button id="refresh" type="button">Atualizar</button>
    </div>
  </header>

  <main>
    <div id="notice" class="notice"></div>
    <section class="stats" id="stats"></section>
    <section class="layout">
      <div class="panel">
        <h2>Noticias recentes</h2>
        <div id="news" class="list"></div>
      </div>
      <aside class="panel">
        <h2>Fontes nas ultimas 24h</h2>
        <div id="sources" class="sources"></div>
      </aside>
    </section>
  </main>

  <footer>
    O scraper roda no GitHub Actions e grava no Supabase. Esta pagina apenas le dados publicos da tabela news.
  </footer>

  <div id="imageModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="imageTitle">
    <div class="modal-card">
      <div class="modal-head">
        <strong id="imageTitle">Imagem da noticia</strong>
        <div class="modal-actions">
          <button id="downloadImage" type="button">Baixar PNG</button>
          <button id="closeImage" type="button" class="mini-button">Fechar</button>
        </div>
      </div>
      <div class="canvas-wrap">
        <canvas id="shareCanvas" width="1080" height="1080"></canvas>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://vdyilgbqxnrwqgoairat.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_de-5vYgBsDImP6s8Y-Sc9Q_xqhcZsnn";
    const TABLE = "news";

    const state = { items: [], total: 0 };

    function escapeHtml(value) {
      const div = document.createElement("div");
      div.textContent = value == null ? "" : String(value);
      return div.innerHTML;
    }

    function age(iso) {
      if (!iso) return "-";
      const diff = Math.max(0, Date.now() - new Date(iso).getTime());
      const minutes = Math.round(diff / 60000);
      if (minutes < 2) return "agora";
      if (minutes < 60) return `${minutes} min`;
      const hours = Math.round(minutes / 60);
      if (hours < 48) return `${hours}h`;
      return `${Math.round(hours / 24)}d`;
    }

    function formatDate(iso) {
      if (!iso) return "Data nao informada";
      const date = new Date(iso);
      if (Number.isNaN(date.getTime())) return "Data nao informada";
      return new Intl.DateTimeFormat("pt-BR", {
        day: "2-digit",
        month: "2-digit",
        year: "numeric",
        hour: "2-digit",
        minute: "2-digit",
      }).format(date);
    }

    function withinHours(item, hours) {
      const value = displayDateValue(item);
      return value >= Date.now() - hours * 60 * 60 * 1000;
    }

    function displayDateValue(item) {
      const preferred = item.type === "INMET" ? item.published_at || item.created_at : item.created_at || item.published_at;
      const value = preferred ? new Date(preferred).getTime() : 0;
      return Number.isNaN(value) ? 0 : value;
    }

    function displayTime(item) {
      if (item.type === "INMET" && item.published_at) {
        return `Data do alerta: ${formatDate(item.published_at)}`;
      }
      return age(item.created_at || item.published_at);
    }

    function tagFor(item) {
      if (item.type === "INMET") return ["weather", "Clima"];
      if (item.type === "ARTERIS" || item.category === "rodovia") return ["road", "Rodovia"];
      return ["", "Noticia"];
    }

    async function supabaseFetch(path, options = {}) {
      const response = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
        ...options,
        headers: {
          apikey: SUPABASE_ANON_KEY,
          Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
          Prefer: "count=exact",
          ...(options.headers || {}),
        },
      });
      if (!response.ok) {
        const detail = await response.text();
        throw new Error(detail || `Supabase HTTP ${response.status}`);
      }
      return response;
    }

    async function loadNews() {
      if (!SUPABASE_ANON_KEY || SUPABASE_ANON_KEY.includes("COLE_AQUI")) {
        throw new Error("Configure SUPABASE_ANON_KEY no arquivo public/index.html antes do deploy.");
      }

      const columns = "title,url,source,category,published_at,created_at,type,summary";
      const newsResponse = await supabaseFetch(`${TABLE}?select=${columns}&order=created_at.desc&limit=50`);
      const inmetResponse = await supabaseFetch(`${TABLE}?select=${columns}&or=(source.ilike.*INMET*,type.eq.INMET)&order=published_at.desc&limit=20`);
      const countResponse = await supabaseFetch(`${TABLE}?select=id`, { method: "HEAD" });
      const latestNews = await newsResponse.json();
      const latestInmet = await inmetResponse.json();

      const merged = new Map();
      for (const item of [...latestNews, ...latestInmet]) {
        const key = item.url || `${item.title}|${item.published_at}|${item.source}`;
        merged.set(key, item);
      }
      state.items = [...merged.values()].sort((a, b) => displayDateValue(b) - displayDateValue(a));
      state.total = Number(countResponse.headers.get("content-range")?.split("/")?.[1] || state.items.length);
    }

    function renderStats() {
      const lastHour = state.items.filter((item) => withinHours(item, 1)).length;
      const lastDay = state.items.filter((item) => withinHours(item, 24)).length;
      const lastCreated = state.items
        .map((item) => item.created_at ? new Date(item.created_at).getTime() : 0)
        .filter(Boolean)
        .sort((a, b) => b - a)[0];
      const cards = [
        ["Ultima coleta", age(lastCreated), "registro mais recente"],
        ["Ultima hora", lastHour, "registros recentes"],
        ["Ultimas 24h", lastDay, "na amostra carregada"],
        ["Total", state.total, "registros no Supabase"],
      ];

      document.getElementById("stats").innerHTML = cards.map(([label, value, hint]) => `
        <article class="stat">
          <div class="label">${label}</div>
          <div class="value">${value}</div>
          <div class="hint">${hint}</div>
        </article>
      `).join("");
    }

    function renderSources() {
      const counts = new Map();
      state.items.filter((item) => withinHours(item, 24)).forEach((item) => {
        const source = item.source || "Sem fonte";
        counts.set(source, (counts.get(source) || 0) + 1);
      });

      const rows = [...counts.entries()].sort((a, b) => b[1] - a[1]).slice(0, 12);
      document.getElementById("sources").innerHTML = rows.length
        ? rows.map(([source, count]) => `<div class="source"><span>${escapeHtml(source)}</span><b>${count}</b></div>`).join("")
        : `<div class="hint">Sem registros nas ultimas 24h.</div>`;
    }

    function renderNews() {
      document.getElementById("news").innerHTML = state.items.length
        ? state.items.map((item, index) => {
            const [tagClass, tagLabel] = tagFor(item);
            const meta = [item.source, item.category, displayTime(item)].filter(Boolean).join(" · ");
            return `
              <article class="item">
                <div class="meta">
                  <span class="tag ${tagClass}">${tagLabel}</span>
                  <span>${escapeHtml(meta)}</span>
                </div>
                <p class="title">
                  <a href="${escapeHtml(item.url || "#")}" target="_blank" rel="noopener">${escapeHtml(item.title)}</a>
                </p>
                <div class="actions">
                  <button class="mini-button make-image" type="button" data-index="${index}">Gerar imagem</button>
                </div>
              </article>
            `;
          }).join("")
        : `<div class="hint">Nenhuma noticia encontrada.</div>`;
    }

    function wrapCanvasText(ctx, text, x, y, maxWidth, lineHeight, maxLines) {
      const words = String(text || "").replace(/\s+/g, " ").trim().split(" ");
      const lines = [];
      let line = "";

      for (const word of words) {
        const test = line ? `${line} ${word}` : word;
        if (ctx.measureText(test).width <= maxWidth) {
          line = test;
        } else {
          if (line) lines.push(line);
          line = word;
        }
        if (lines.length === maxLines) break;
      }
      if (line && lines.length < maxLines) lines.push(line);

      if (words.length && lines.length === maxLines) {
        const last = lines[maxLines - 1];
        let trimmed = last;
        while (ctx.measureText(`${trimmed}...`).width > maxWidth && trimmed.length > 8) {
          trimmed = trimmed.slice(0, -1);
        }
        lines[maxLines - 1] = `${trimmed.trim()}...`;
      }

      lines.forEach((content, index) => ctx.fillText(content, x, y + index * lineHeight));
      return y + lines.length * lineHeight;
    }

    function truncateClean(text, maxLength) {
      const clean = String(text || "").replace(/\s+/g, " ").trim();
      if (clean.length <= maxLength) return clean;

      const slice = clean.slice(0, maxLength + 1);
      const sentenceEnd = Math.max(slice.lastIndexOf(". "), slice.lastIndexOf("; "), slice.lastIndexOf("! "), slice.lastIndexOf("? "));
      if (sentenceEnd > maxLength * .55) return slice.slice(0, sentenceEnd + 1).trim();

      const separators = [", ", " e ", " ou ", " - ", " — ", " "];
      for (const sep of separators) {
        const index = slice.lastIndexOf(sep);
        if (index > maxLength * .62) return `${slice.slice(0, index).trim()}...`;
      }

      return `${clean.slice(0, maxLength).trim()}...`;
    }

    function smartSummary(item) {
      let text = String(item.summary || "").replace(/<[^>]+>/g, " ");
      text = text
        .replace(/\s+/g, " ")
        .replace(/\bINMET publica aviso iniciando em:\s*[^.]+\.?\s*/i, "")
        .replace(/\bAviso para as [ÁA]reas?:\s*.*$/i, "")
        .replace(/\b[ÁA]reas?:\s*.*$/i, "")
        .replace(/\bBaixo risco de\b/gi, "Risco de")
        .trim();

      if (!text) {
        text = item.title || "Resumo indisponivel no banco. Abra a noticia para ver os detalhes completos.";
      }

      if (item.type === "INMET" && /chuvas intensas/i.test(item.title || "")) {
        text = text
          .replace(/^Chuva entre/i, "Chuva intensa com acumulados entre")
          .replace(/ventos intensos/i, "ventos fortes");
      }

      return truncateClean(text, 285);
    }

    function drawGrid(ctx, width, height) {
      ctx.strokeStyle = "rgba(18,217,129,.10)";
      ctx.lineWidth = 2;
      for (let x = -120; x < width + 120; x += 92) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.bezierCurveTo(x + 80, 260, x - 120, 600, x + 70, height);
        ctx.stroke();
      }
      for (let y = -80; y < height + 80; y += 86) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.bezierCurveTo(300, y + 70, 620, y - 95, width, y + 40);
        ctx.stroke();
      }
    }

    function drawShareImage(item) {
      const canvas = document.getElementById("shareCanvas");
      const ctx = canvas.getContext("2d");
      const w = canvas.width;
      const h = canvas.height;
      const summary = smartSummary(item);
      const source = [item.source, item.category].filter(Boolean).join(" · ");
      const published = formatDate(item.published_at || item.created_at);

      ctx.clearRect(0, 0, w, h);
      ctx.fillStyle = "#0d1712";
      ctx.fillRect(0, 0, w, h);
      drawGrid(ctx, w, h);

      const cardX = 86;
      const cardY = 84;
      const cardW = w - 172;
      const cardH = h - 168;
      ctx.fillStyle = "rgba(18,217,129,.075)";
      ctx.fillRect(cardX, cardY, cardW, cardH);
      ctx.strokeStyle = "rgba(18,217,129,.48)";
      ctx.lineWidth = 3;
      ctx.strokeRect(cardX, cardY, cardW, cardH);

      ctx.fillStyle = "#12d981";
      ctx.beginPath();
      ctx.moveTo(158, 84);
      ctx.lineTo(224, 84);
      ctx.lineTo(191, 128);
      ctx.closePath();
      ctx.fill();

      ctx.fillStyle = "#d7e4de";
      ctx.font = "800 46px Segoe UI, Arial, sans-serif";
      ctx.fillText("OVERHAUL", 248, 126);
      ctx.fillStyle = "#12d981";
      ctx.font = "800 25px Segoe UI, Arial, sans-serif";
      ctx.fillText("ROAD NEWS", 250, 166);

      ctx.fillStyle = "#12d981";
      ctx.font = "800 30px Segoe UI, Arial, sans-serif";
      ctx.fillText("Resumo da noticia", 136, 258);

      ctx.fillStyle = "#f5fbf8";
      ctx.font = "900 44px Segoe UI, Arial, sans-serif";
      let nextY = wrapCanvasText(ctx, item.title, 136, 326, 808, 55, 3);
      nextY += 16;

      ctx.fillStyle = "rgba(255,255,255,.09)";
      ctx.fillRect(136, nextY + 22, 808, 310);
      ctx.strokeStyle = "rgba(18,217,129,.35)";
      ctx.strokeRect(136, nextY + 22, 808, 310);

      ctx.fillStyle = "#d7e4de";
      ctx.font = "600 27px Segoe UI, Arial, sans-serif";
      wrapCanvasText(ctx, summary, 168, nextY + 78, 744, 39, 6);

      ctx.fillStyle = "#12d981";
      ctx.font = "800 23px Segoe UI, Arial, sans-serif";
      ctx.fillText("Fonte", 136, 894);
      ctx.fillStyle = "#f5fbf8";
      ctx.font = "700 27px Segoe UI, Arial, sans-serif";
      wrapCanvasText(ctx, source || "Road News", 136, 932, 560, 34, 2);

      ctx.fillStyle = "#d7e4de";
      ctx.font = "700 22px Segoe UI, Arial, sans-serif";
      ctx.textAlign = "right";
      ctx.fillText("Publicado em", 944, 910);
      ctx.fillStyle = "#f5fbf8";
      ctx.font = "800 24px Segoe UI, Arial, sans-serif";
      ctx.fillText(published, 944, 946);
      ctx.fillStyle = "#12d981";
      ctx.font = "800 24px Segoe UI, Arial, sans-serif";
      ctx.fillText("road-news", 944, 984);
      ctx.textAlign = "left";
    }

    function openImageModal(index) {
      const item = state.items[index];
      if (!item) return;
      drawShareImage(item);
      document.getElementById("imageTitle").textContent = item.title || "Imagem da noticia";
      document.getElementById("imageModal").classList.add("open");
    }

    function closeImageModal() {
      document.getElementById("imageModal").classList.remove("open");
    }

    function downloadCurrentImage() {
      const canvas = document.getElementById("shareCanvas");
      const link = document.createElement("a");
      link.download = `road-news-${Date.now()}.png`;
      link.href = canvas.toDataURL("image/png");
      link.click();
    }

    function setNotice(message) {
      const notice = document.getElementById("notice");
      notice.textContent = message || "";
      notice.style.display = message ? "block" : "none";
    }

    async function refresh() {
      const button = document.getElementById("refresh");
      button.disabled = true;
      setNotice("");
      try {
        await loadNews();
      } catch (error) {
        state.items = [];
        state.total = 0;
        setNotice(error.message);
      } finally {
        renderStats();
        renderSources();
        renderNews();
        button.disabled = false;
      }
    }

    document.getElementById("refresh").addEventListener("click", refresh);
    document.getElementById("news").addEventListener("click", (event) => {
      const button = event.target.closest(".make-image");
      if (button) openImageModal(Number(button.dataset.index));
    });
    document.getElementById("closeImage").addEventListener("click", closeImageModal);
    document.getElementById("downloadImage").addEventListener("click", downloadCurrentImage);
    document.getElementById("imageModal").addEventListener("click", (event) => {
      if (event.target.id === "imageModal") closeImageModal();
    });
    refresh();
  </script>
</body>
</html>
